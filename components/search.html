<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay" onclick="toggleSearch()"></div>

<!-- SEARCH DRAWER -->
<div class="search-drawer" id="searchDrawer">

  <!-- HEADER -->
  <div class="search-header">

    <div class="search-input-wrap">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>

      <input
        type="text"
        id="searchInput"
        placeholder="Search groceries, fruits, vegetables..."
        oninput="handleSearch(this.value)"
        autocomplete="off"
      />

    </div>

    <button class="close-search" onclick="toggleSearch()" aria-label="Close search">

      <svg viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2"
      stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>

    </button>

  </div>

  <!-- CONTENT -->
  <div class="search-content">

    <!-- DEFAULT STATE -->
    <div id="searchDefaultState">

      <div class="search-section">
        <h4>Popular Searches</h4>

        <div class="suggestion-tags">

          <button class="tag" onclick="fillSearch('Organic')">Organic</button>
          <button class="tag" onclick="fillSearch('Fresh Fruits')">Fresh Fruits</button>
          <button class="tag" onclick="fillSearch('Dairy')">Dairy</button>
          <button class="tag" onclick="fillSearch('Snacks')">Snacks</button>
          <button class="tag" onclick="fillSearch('Vegetables')">Vegetables</button>

        </div>

      </div>

      <div class="search-section">

        <h4>Trending Items</h4>

        <div class="trending-list" id="trendingList">
          <!-- Injected by app.js -->
        </div>

      </div>

    </div>

    <!-- RESULTS -->
    <div id="searchResultsState" style="display:none;">

      <div class="results-header">
        <span id="resultsCount">0</span> results found
      </div>

      <div class="results-grid" id="searchResultsGrid">
        <!-- Injected by app.js -->
      </div>

    </div>

  </div>

</div>
